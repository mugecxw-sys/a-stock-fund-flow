<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A股概念板块主力资金流向</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>

body {
    margin:0;
    font-family: Arial, "Microsoft YaHei", sans-serif;
    background:#f5f5f5;
}

.container {
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h2 {
    text-align:center;
}

.time {
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

#chart {
    width:100%;
    height:600px;
    background:white;
    border-radius:10px;
}

</style>

</head>


<body>

<div class="container">

<h2>
A股概念板块主力资金流向
</h2>

<div class="time" id="updateTime">
正在加载数据...
</div>

<div id="chart"></div>


</div>


<script>


async function loadData(){

    const response = await fetch("moneyflow.json?t=" + Date.now());

    const data = await response.json();


    let names=[];
    let values=[];
    let colors=[];


    data.forEach(item=>{

        names.push(item.name);

        values.push(
            item.money
        );


        if(item.money>=0){
            colors.push("#e74c3c");
        }
        else{
            colors.push("#2ecc71");
        }

    });



    let chart = echarts.init(
        document.getElementById("chart")
    );


    let option={


        tooltip:{
            trigger:"axis",

            formatter:function(params){

                let p=params[0];

                return p.name+
                "<br/>主力资金："+
                p.value+
                " 亿";

            }

        },


        grid:{
            left:"5%",
            right:"5%",
            bottom:"20%"
        },


        xAxis:{

            type:"category",

            data:names,

            axisLabel:{
                rotate:45
            }

        },


        yAxis:{
            type:"value",

            name:"亿元"

        },


        series:[{

            type:"bar",

            data:values,


            itemStyle:{

                color:function(params){

                    return colors[params.dataIndex];

                }

            }


        }]

    };


    chart.setOption(option);



    document.getElementById(
        "updateTime"
    ).innerHTML=
    "更新时间："+new Date().toLocaleString();


}


loadData();


</script>


</body>

</html>
