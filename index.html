<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A股概念板块主力资金流向</title>


<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>


<style>

body{

    margin:0;

    background:#f3f5f7;

    font-family:
    "Microsoft YaHei",
    Arial;

}


.container{

    max-width:1200px;

    margin:auto;

    padding:20px;

}



.card{

    background:white;

    border-radius:15px;

    padding:20px;

    box-shadow:
    0 3px 15px rgba(0,0,0,0.08);

}



h1{

    text-align:center;

    font-size:26px;

}


.update{

    text-align:center;

    color:#666;

    margin-bottom:20px;

}



#chart{

    width:100%;

    height:650px;

}


</style>


</head>


<body>


<div class="container">


<div class="card">


<h1>
A股概念板块主力资金流向
</h1>


<div class="update" id="time">

数据加载中...

</div>


<div id="chart"></div>


</div>


</div>



<script>


async function loadData(){


    try{


        const res =
        await fetch(
        "moneyflow.json?t="
        +Date.now()
        );


        const json =
        await res.json();



        const data =
        json.data;



        let names=[];

        let values=[];

        let colors=[];



        data.forEach(item=>{


            names.push(
                item.name
            );


            values.push(
                item.money
            );


            if(item.money>=0){

                colors.push("#e74c3c");

            }else{

                colors.push("#2ecc71");

            }


        });



        document.getElementById("time")
        .innerHTML=
        "更新时间："
        +json.update_time;



        let chart =
        echarts.init(
        document.getElementById("chart")
        );



        let option={



            tooltip:{


                trigger:"axis",


                formatter:function(p){


                    return p[0].name
                    +"<br>主力资金："
                    +p[0].value
                    +" 亿";


                }


            },



            grid:{


                left:"5%",

                right:"5%",

                bottom:"25%"


            },



            xAxis:{


                type:"category",

                data:names,


                axisLabel:{


                    rotate:45


                }


            },



            yAxis:{


                type:"value",

                name:"亿元"


            },



            series:[{


                type:"bar",

                data:values,


                label:{


                    show:true,


                    position:"top",


                    formatter:"{c}亿"


                },


                itemStyle:{


                    color:function(params){


                        return colors[
                        params.dataIndex
                        ];


                    }


                }


            }]



        };



        chart.setOption(option);



    }


    catch(error){


        document.getElementById("time")
        .innerHTML=
        "数据加载失败："+error;


    }



}



loadData();



</script>


</body>

</html>
