name: Update A Stock Money Flow


on:

  schedule:

    # 每小时运行一次
    - cron: "0 * * * *"


  workflow_dispatch:



jobs:


  update:


    runs-on: ubuntu-latest


    steps:


      - name: Checkout

        uses: actions/checkout@v4



      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.11"



      - name: Install packages

        run: |

          pip install akshare pandas



      - name: Update data

        run: |

          python python/update_data.py



      - name: Commit changes

        run: |

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"

          git add moneyflow.json

          git commit -m "update money flow" || exit 0

          git push
