name: Update A Stock Money Flow


on:


  schedule:


    # 北京时间:
    # 10:00
    # 11:00
    # 13:00
    # 14:00
    # 15:00

    - cron: "0 2,3,5,6,7 * * 1-5"



  workflow_dispatch:



permissions:


  contents: write




jobs:


  update:


    runs-on: ubuntu-latest



    steps:



      - name: Checkout


        uses: actions/checkout@v5




      - name: Setup Python


        uses: actions/setup-python@v6


        with:


          python-version: "3.11"




      - name: Install packages


        run: |


          pip install akshare pandas




      - name: Update data


        run: |


          python python/update_data.py




      - name: Commit changes


        run: |


          git config --global user.name "github-actions"


          git config --global user.email "actions@github.com"


          git add -A


          git commit -m "update money flow" || exit 0


          git push
