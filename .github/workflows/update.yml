name: Update A Stock Money Flow

on:
  schedule:
    # Beijing time: 10:00, 11:00, 13:00, 14:00, 15:00
    - cron: "0 2,3,5,6,7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: a-stock-fund-flow-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update data
        run: |
          python python/update_data.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data moneyflow.json python .github requirements.txt .gitignore index.html
          git commit -m "update money flow" || exit 0
          git push
